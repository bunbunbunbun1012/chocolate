<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巧克力碱水结</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "STZhongsong", "华文中宋", "STSong", "SimSun", serif;
            background: linear-gradient(180deg, #faf8f5 0%, #f0ede8 50%, #e8e4de 100%);
            min-height: 100vh;
            color: #3e2723;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px 80px;
            text-align: center;
        }

        /* 巧克力碱水结 SVG */
        .pretzel-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            min-height: 320px;
        }

        .pretzel-svg {
            width: 300px;
            height: 300px;
            animation: floatRotate 6s ease-in-out infinite;
        }

        @keyframes floatRotate {
            0%, 100% {
                transform: translateY(0) rotate(-3deg);
            }
            50% {
                transform: translateY(-18px) rotate(3deg);
            }
        }

        /* 标题区域 */
        .title-section {
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #3e2723;
            margin-bottom: 12px;
        }

        .sub-title {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #6d4c41;
            margin-bottom: 30px;
        }

        /* 介绍文字 */
        .intro-text {
            font-size: 1rem;
            line-height: 2;
            color: #5d4037;
            max-width: 600px;
            margin: 0 auto 50px;
            text-align: justify;
            text-align-last: center;
            letter-spacing: 0.03em;
        }

        /* 小标题 */
        .section-title {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: #4e342e;
            margin-bottom: 35px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: #8d6e63;
            margin: 12px auto 0;
            border-radius: 1px;
        }

        /* 卡片区域 */
        .cards-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(62, 39, 35, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: default;
            border: 1px solid rgba(141, 110, 99, 0.08);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(62, 39, 35, 0.12);
            background: rgba(255, 255, 255, 0.9);
        }

        .card-name {
            font-size: 1.15rem;
            font-weight: 500;
            color: #3e2723;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }

        .card-feature {
            font-size: 0.9rem;
            color: #6d4c41;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .card-address {
            font-size: 0.82rem;
            color: #8d6e63;
            font-style: italic;
        }

        /* 装饰线条 */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8d6e63, transparent);
            margin: 0 auto 40px;
            opacity: 0.4;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px 60px;
            }

            .pretzel-svg {
                width: 240px;
                height: 240px;
            }

            .pretzel-wrapper {
                min-height: 260px;
            }

            .main-title {
                font-size: 2rem;
                letter-spacing: 0.1em;
            }

            .sub-title {
                font-size: 0.95rem;
            }

            .intro-text {
                font-size: 0.9rem;
                line-height: 1.9;
            }

            .cards-wrapper {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .card {
                padding: 28px 20px;
            }

            .section-title {
                font-size: 1.15rem;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 1.7rem;
            }

            .pretzel-svg {
                width: 200px;
                height: 200px;
            }

            .pretzel-wrapper {
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 巧克力碱水结 SVG -->
        <div class="pretzel-wrapper">
            <svg class="pretzel-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- 巧克力渐变 -->
                    <linearGradient id="chocoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#5D4037;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#4E342E;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
                    </linearGradient>
                    <!-- 高光渐变 -->
                    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#3E2723;stop-opacity:0" />
                    </linearGradient>
                    <!-- 阴影 -->
                    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
                        <feOffset dx="0" dy="6" result="offsetblur"/>
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.15"/>
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- 碱水结主体 -->
                <g filter="url(#softShadow)">
                    <!-- 下半部分交叉环 -->
                    <path d="M 60 130 
                             C 40 130, 30 110, 35 95 
                             C 40 80, 55 75, 70 85 
                             C 85 95, 90 110, 80 125 
                             C 75 135, 65 135, 60 130 Z" 
                          fill="url(#chocoGrad)" stroke="#3E2723" stroke-width="1.5"/>
                    
                    <path d="M 140 130 
                             C 160 130, 170 110, 165 95 
                             C 160 80, 145 75, 130 85 
                             C 115 95, 110 110, 120 125 
                             C 125 135, 135 135, 140 130 Z" 
                          fill="url(#chocoGrad)" stroke="#3E2723" stroke-width="1.5"/>
                    
                    <!-- 中间交叉连接 -->
                    <path d="M 70 85 
                             C 85 100, 115 100, 130 85 
                             C 125 95, 115 105, 100 105 
                             C 85 105, 75 95, 70 85 Z" 
                          fill="url(#chocoGrad)" stroke="#3E2723" stroke-width="1.5"/>
                    
                    <!-- 上半部分扭结 -->
                    <path d="M 100 105 
                             C 90 90, 80 75, 70 60 
                             C 60 45, 75 35, 85 40 
                             C 95 45, 100 55, 100 65 
                             C 100 55, 105 45, 115 40 
                             C 125 35, 140 45, 130 60 
                             C 120 75, 110 90, 100 105 Z" 
                          fill="url(#chocoGrad)" stroke="#3E2723" stroke-width="1.5"/>
                    
                    <!-- 高光层 -->
                    <path d="M 60 130 
                             C 40 130, 30 110, 35 95 
                             C 40 80, 55 75, 70 85 
                             C 85 95, 90 110, 80 125 
                             C 75 135, 65 135, 60 130 Z" 
                          fill="url(#highlight)" opacity="0.5"/>
                    
                    <path d="M 140 130 
                             C 160 130, 170 110, 165 95 
                             C 160 80, 145 75, 130 85 
                             C 115 95, 110 110, 120 125 
                             C 125 135, 135 135, 140 130 Z" 
                          fill="url(#highlight)" opacity="0.5"/>
                    
                    <path d="M 100 105 
                             C 90 90, 80 75, 70 60 
                             C 60 45, 75 35, 85 40 
                             C 95 45, 100 55, 100 65 
                             C 100 55, 105 45, 115 40 
                             C 125 35, 140 45, 130 60 
                             C 120 75, 110 90, 100 105 Z" 
                          fill="url(#highlight)" opacity="0.5"/>
                    
                    <!-- 巧克力淋面滴落效果 -->
                    <ellipse cx="75" cy="128" rx="3" ry="5" fill="#4E342E" opacity="0.6"/>
                    <ellipse cx="125" cy="128" rx="3" ry="5" fill="#4E342E" opacity="0.6"/>
                    <ellipse cx="100" cy="102" rx="2.5" ry="4" fill="#4E342E" opacity="0.5"/>
                    
                    <!-- 盐粒点缀 -->
                    <ellipse cx="55" cy="105" rx="1.5" ry="1" fill="#D7CCC8" opacity="0.7"/>
                    <ellipse cx="145" cy="105" rx="1.5" ry="1" fill="#D7CCC8" opacity="0.7"/>
                    <ellipse cx="85" cy="50" rx="1.5" ry="1" fill="#D7CCC8" opacity="0.7"/>
                    <ellipse cx="115" cy="50" rx="1.5" ry="1" fill="#D7CCC8" opacity="0.7"/>
                    <ellipse cx="100" cy="75" rx="1.5" ry="1" fill="#D7CCC8" opacity="0.7"/>
                </g>
            </svg>
        </div>

        <!-- 标题 -->
        <div class="title-section">
            <h1 class="main-title">巧克力碱水结</h1>
            <p class="sub-title">起源与简介</p>
        </div>

        <div class="divider"></div>

        <!-- 介绍文字 -->
        <p class="intro-text">
            碱水结（Pretzel）起源于欧洲，传说由意大利修道士发明，形状象征祈祷的手臂。巧克力碱水结是现代变体，在传统碱水面包外裹上香浓巧克力层，微咸面包与可可甜味交融。
        </p>

        <!-- 推荐店铺 -->
        <h2 class="section-title">北京推荐店铺</h2>
        
        <div class="cards-wrapper">
            <div class="card">
                <div class="card-name">面包会有的</div>
                <div class="card-feature">每日现烤碱水，巧克力淋面醇厚</div>
                <div class="card-address">朝阳大悦城附近</div>
            </div>
            
            <div class="card">
                <div class="card-name">德南面包房</div>
                <div class="card-feature">传统德式配方，碱味足，巧克力脆皮</div>
                <div class="card-address">亮马桥好运街</div>
            </div>
            
            <div class="card">
                <div class="card-name">原麦山丘</div>
                <div class="card-feature">巧克力碱水结软韧兼备，可可香气浓郁</div>
                <div class="card-address">各大商圈有售</div>
            </div>
        </div>
    </div>
</body>
</html>
